name: Publish NuGet package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Restore
        run: dotnet restore ManuAPI/ManuAPI.csproj

      - name: Pack
        run: dotnet pack ManuAPI/ManuAPI.csproj -c Release -o ${{ github.workspace }}/nupkg

      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        with:
          user: manuu

      - name: Push to NuGet.org
        run: dotnet nuget push "${{ github.workspace }}/nupkg/*.nupkg" --source https://api.nuget.org/v3/index.json --skip-duplicate
